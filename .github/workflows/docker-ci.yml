name: Linear Regression DevOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python -m pytest test_app.py -v --tb=short
      
      - name: Test Results Summary
        if: success()
        run: echo "✓ All tests passed successfully!"
      
      - name: Test Failed
        if: failure()
        run: |
          echo "✗ Tests failed - stopping pipeline"
          exit 1

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t lr-model:${{ github.sha }} .
          docker build -t lr-model:latest .
          echo "Docker image built successfully"
      
      - name: Save Docker image
        run: |
          docker save lr-model:latest -o lr-model-latest.tar
      
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: lr-model-latest.tar
          retention-days: 1

  run-container:
    name: Run Container
    runs-on: ubuntu-latest
    needs: build
    if: success()
    
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-image
      
      - name: Load Docker image
        run: |
          docker load -i lr-model-latest.tar
      
      - name: Run container
        run: |
          docker run --rm lr-model:latest
          echo "Container executed successfully"
      
      - name: Pipeline Success
        run: |
          echo "✓ CI/CD Pipeline completed successfully!"
          echo "  - Tests: PASSED"
          echo "  - Docker Build: PASSED"
          echo "  - Container Run: PASSED"
